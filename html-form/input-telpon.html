<html lang="en">
<head>

    <title>input Telpon</title>
</head>
<body>
    <form action="">
        <label for="telpon">Telpon :</label>
        <input type="tel" name="telpon" id="telpon" pattern="(62) [0-9] {8,14}"><br>
        <input type="submit" value="simpan">
    </form>
</body>
