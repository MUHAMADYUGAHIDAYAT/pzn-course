<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Checkbox</title>
</head>
<body>
    <form>
        Hobby : <br>

        <input type="checkbox" name="hobby" id="coding" value="coding">
        <label for="coding">coding</label>
        <br>
        <input type="checkbox" name="hobby" id="gaming" value="gaming">
        <label for="gaming">gaming</label>
        <br>
        <input type="checkbox" name="hobby" id="watching" value="watching">
        <label for="watching">watching</label>
        <br>
        <input type="submit" value="simpan">
    </form>
</body>
</html>
