<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Belajar Table</title>
</head>
<body>
    <h1>Belajar Table</h1>
    
    <table style="border: 1px solid black;">
        <colgroup>
            <col span="2" style="background-color: yellow;">
            <col style="background-color: rgb(255, 174, 0);">
        </colgroup>
        <thead>
            <tr>
                <th colspan="2">Nama</th>
                <th>Nilai</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Adhitya</td>
                <td>Pangestu</td>
                <td>80</td>
            </tr>
        </tbody>
        <tbody>
            <tr>
                <td>Raffi</td>
                <td>Muaulana</td>
                <td>90</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <td rowspan="2">total</td>
                <td>Total</td>
                <td>170</td>
            </tr>
            <tr>
                <td>rata-rata</td>
                <td>85</td>
            </tr>
        </tfoot>
    </table>
</body>
</html>
