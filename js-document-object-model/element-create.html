<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Element Create</title>
</head>
<body>
    <!-- contoh cara pembuatan element -->
    <div id="content" class="content"></div>

    <script>

        const content = document.getElementById("content"); //ambil dlu id dari element yang ingin jadi parent nya

        const title = document.createElement("h1");//gunakan .createElement untuk membuat element dan di dalam nya isi tag/element apa yan ingin di buat contoh nya di sini h1
        title.textContent = "Cihuuuy"; // isi text content dari element yang di buat
        content.appendChild(title); // gunakan method .appendChild() pada parent untuk memanggi title

        const desc = document.createElement("p");
        desc.textContent = "To Good To Be True :)"
        content.appendChild(desc);

    </script>
</body>
</html>
