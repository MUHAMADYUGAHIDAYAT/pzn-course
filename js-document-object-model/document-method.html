<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document Method</title>
</head>
<body>
    <div>
        <p id="tulisan">ini adalah tulisan</p>
    </div>
    <script>

        const tulisan = document.getElementById("tulisan");
        console.info(tulisan)

        // ini adalah contoh salah satu penggunnaan method unutk mengambil attribut id yang ada di dalam tag html untuk di panggil atau di jadikan variable di js
    </script>
</body>
</html>
