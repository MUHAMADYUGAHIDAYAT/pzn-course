<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Element Method</title>
</head>
<body>
    <div id="content" class="content">
        <h1 id="title" class="titke">This Title</h1>
        <p id="description" class="descriotion">Adu-du-du-dud-uuuh</p>
    </div>

    <script>
        // untuk penggunaan method pada elemant di gunakan di samping element yang di panggil atau variable dari element nya contoh
        document.getElementById("title").remove(); // ini penggunaan langsung setelah id element nya di panggil

        const desc = document.getElementById("description");
        desc.remove(); // ini penggunaan setelah element jadi variable
    </script>
</body> 
</html>
