<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Element Property</title>
</head>
<body>
    <!-- contoh penggunaan element propety  -->
    <div id="content" class="content">
        <h1>Belajar Javascript Dom</h1>
        <p>Selamat Belajar Javascript DOM</p>
    </div>


    <script>
        const content = document.getElementById("content");

        //contoh penggunaan element property untuk melihat apa saja isi dalam element
        console.info(content.id);
        console.info(content.className);
        console.info(content.tagName);


    </script>
</body>
</html>
